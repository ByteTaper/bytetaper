# Control Plane + Runtime profile (merge with docker-compose.yml).
# Usage: docker compose -f docker-compose.yml -f docker-compose.control-plane.yml up -d --build

services:
  # Dedicated incremental server build (separate from unit/integration CMake trees).
  bytetaper-build-server:
    command:
      - /bin/bash
      - -lc
      - |
        set -eu
        cmake -S . -B build/control-plane-compose -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DBYTETAPER_ENABLE_GTEST_TESTS=OFF \
          -DBYTETAPER_ENABLE_INTEGRATION_TESTS=ON \
          -DCMAKE_C_COMPILER_LAUNCHER=ccache \
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
        cmake --build build/control-plane-compose --target bytetaper-extproc-server

  # Avoid host port 18080/18081 clash if monolithic extproc is started alongside the profile.
  bytetaper-extproc:
    ports: !reset []
    depends_on:
      mock-api:
        condition: service_healthy
    command:
      - /bin/bash
      - -lc
      - sleep infinity

  bytetaper-control-plane:
    image: bytetaper-dev:latest
    # Build is orchestrated by scripts/test/_control_plane_compose_lib.sh (compose run --rm
    # bytetaper-build-server) before this service starts; avoid re-running the build on up.
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - bt-build:/workspace/build
      - bt-ccache:/home/bytetaper/.cache/ccache
      - bytetaper-policy-state:/var/lib/bytetaper/policy-state-db
    environment:
      - BYTETAPER_RUNTIME_ROLE=control-plane
      - BYTETAPER_DEPLOYMENT_MODE=local-dev
      - BYTETAPER_CONTROL_PLANE_ENABLED=1
      - BYTETAPER_POLICY_STATE_DB=/var/lib/bytetaper/policy-state-db
      - BYTETAPER_CONTROL_PLANE_BIND_ADDRESS=0.0.0.0
      - BYTETAPER_CONTROL_PLANE_PORT=19090
      - BYTETAPER_BOOTSTRAP_POLICY_FILE=examples/policies/bootstrap-policy.yaml
    command:
      - /bin/bash
      - -lc
      - |
        set -eu
        mkdir -p /var/lib/bytetaper/policy-state-db
        exec ./build/control-plane-compose/bytetaper-extproc-server \
          --metrics-address 0.0.0.0 \
          --metrics-port 18081 \
          --policy-state-db /var/lib/bytetaper/policy-state-db
    ports:
      - "19090:19090"
      - "19091:18081"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/19090 && printf \"GET /healthz HTTP/1.0\\r\\nHost: 127.0.0.1\\r\\n\\r\\n\" >&3 && read -r line <&3 && [[ \"$$line\" == *\"200\"* ]]'"]
      interval: 2s
      timeout: 2s
      retries: 20
      start_period: 10s

  bytetaper-runtime:
    image: bytetaper-dev:latest
    depends_on:
      bytetaper-control-plane:
        condition: service_healthy
      mock-api:
        condition: service_healthy
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - bt-build:/workspace/build
      - bt-ccache:/home/bytetaper/.cache/ccache
      - bytetaper-runtime-policy:/var/lib/bytetaper/policies
    environment:
      - BYTETAPER_RUNTIME_ROLE=runtime-only
      - BYTETAPER_DEPLOYMENT_MODE=multi-runtime
      - BYTETAPER_CONTROL_PLANE_ENABLED=1
      - BYTETAPER_CONTROL_PLANE_ENDPOINT=http://bytetaper-control-plane:19090
      - BYTETAPER_POLICY_PULL_ENABLED=1
      - BYTETAPER_POLICY_PULL_INTERVAL_MS=2000
      - BYTETAPER_RUNTIME_ID=bytetaper-runtime-0
      - BYTETAPER_POLICY_PERSISTENCE_ENABLED=0
      - BYTETAPER_POLICY_STATE_DIR=/var/lib/bytetaper/policies
      - BYTETAPER_POLICY_INACTIVE_MODE=pass-through
    command:
      - /bin/bash
      - -lc
      - |
        set -eu
        mkdir -p /var/lib/bytetaper/policies /tmp/bytetaper-cache-cp-demo
        exec ./build/control-plane-compose/bytetaper-extproc-server \
          --listen-address 0.0.0.0:18080 \
          --policy-file examples/policies/bootstrap-policy.yaml \
          --l2-cache-path /tmp/bytetaper-cache-cp-demo \
          --metrics-address 0.0.0.0 \
          --metrics-port 18081
    ports:
      - "18080:18080"
      # 18083 avoids collision with monolithic bytetaper-extproc on 18081 when port reset fails.
      - "18083:18081"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/18081 && printf \"GET /readyz HTTP/1.0\\r\\nHost: 127.0.0.1\\r\\n\\r\\n\" >&3 && read -r line <&3 && [[ \"$$line\" == *\"200\"* ]]'"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 20s

  envoy:
    depends_on:
      # Override base (service_healthy): do not gate Envoy on monolithic extproc readiness.
      bytetaper-extproc:
        condition: service_started
      bytetaper-runtime:
        condition: service_healthy
      mock-api:
        condition: service_healthy
    ports:
      - "10000:10000"
    volumes:
      - ./examples/envoy/control-plane-demo.yaml:/etc/envoy/envoy.yaml:ro

  bytetaper-control-plane-compose-test:
    image: bytetaper-dev:latest
    working_dir: /workspace
    volumes:
      - ./:/workspace
    depends_on:
      bytetaper-control-plane:
        condition: service_healthy
      bytetaper-runtime:
        condition: service_healthy
      mock-api:
        condition: service_healthy
      envoy:
        condition: service_started
    environment:
      - BYTETAPER_CONTROL_PLANE_URL=http://bytetaper-control-plane:19090
      - BYTETAPER_ENVOY_URL=http://envoy:10000
      - BYTETAPER_FIXTURES_DIR=/workspace/tests/fixtures/control-plane
    command:
      - /bin/bash
      - -lc
      - |
        set -eu
        python3 tests/integration/e2e/control_plane_field_allowlist_e2e_test.py

volumes:
  bytetaper-policy-state:
  bytetaper-runtime-policy:
