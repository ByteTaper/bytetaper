apiVersion: bytetaper.io/v1alpha1
kind: ByteTaperGateway
metadata:
  labels:
    app.kubernetes.io/name: bytetapergateway
    app.kubernetes.io/instance: bytetapergateway-sample
    app.kubernetes.io/part-of: operator
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/created-by: operator
  name: bytetapergateway-sample
  namespace: bytetaper
spec:
  replicas: 2
  image:
    repository: ghcr.io/bytetaper/bytetaper-runtime
    digest: sha256:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
  policy:
    configMapRef:
      name: bytetaper-policy
    key: policy.yaml
  l2Cache:
    enabled: true
    persistence:
      enabled: true
      size: 20Gi
      storageClassName: gp3
  admin:
    enabled: false
