    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/18081 && printf \"GET /readyz HTTP/1.0\\r\\nHost: 127.0.0.1\\r\\n\\r\\n\" >&3 && read -r line <&3 && [[ \"$$line\" == *\"200\"* ]]'"]
      interval: 2s
      timeout: 2s
      retries: 20
      start_period: 10s

  envoy-bytetaper-coalescing:
    build:
      context: .
      dockerfile: docker/envoy.Dockerfile
    depends_on:
      mock-api:
        condition: service_healthy
      bytetaper-extproc-coalescing:
