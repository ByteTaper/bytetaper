services:
  bytetaper-dev:
    build:
      context: .
      dockerfile: docker/dev.Dockerfile
      args:
        LOCAL_UID: ${LOCAL_UID:-1000}
        LOCAL_GID: ${LOCAL_GID:-1000}
    image: bytetaper-dev:latest
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - bt-build:/workspace/build
      - bt-ccache:/home/bytetaper/.cache/ccache
  bytetaper-build-server:
    image: bytetaper-dev:latest
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - bt-build:/workspace/build
      - bt-ccache:/home/bytetaper/.cache/ccache
    command:
      - /bin/bash
      - -lc
      - |
        set -eu
        cmake -S . -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DBYTETAPER_ENABLE_INTEGRATION_TESTS=ON \
          -DBYTETAPER_ENABLE_GTEST_TESTS=OFF \
          -DCMAKE_C_COMPILER_LAUNCHER=ccache \
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
        cmake --build build --target bytetaper-extproc-server

  bytetaper-unit-test:
    image: bytetaper-dev:latest
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - bt-build:/workspace/build
      - bt-ccache:/home/bytetaper/.cache/ccache
    command:
      - /bin/bash
      - -lc
      - |
        set -eu
        cmake -S . -B build -G Ninja \
          -DBYTETAPER_ENABLE_GTEST_TESTS=ON \
          -DBYTETAPER_ENABLE_INTEGRATION_TESTS=ON \
          -DCMAKE_C_COMPILER_LAUNCHER=ccache \
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
        cmake --build build
        ctest --test-dir build --output-on-failure
  bytetaper-smoke-test:
    image: bytetaper-dev:latest
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - bt-build:/workspace/build
      - bt-ccache:/home/bytetaper/.cache/ccache
    command:
      - /bin/bash
      - -lc
      - |
        set -eu
        cmake -S . -B build -G Ninja \
          -DBYTETAPER_ENABLE_INTEGRATION_TESTS=ON \
          -DBYTETAPER_ENABLE_GTEST_TESTS=OFF \
          -DCMAKE_C_COMPILER_LAUNCHER=ccache \
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
        cmake --build build --target bytetaper-extproc --target extproc_server_smoke_test
        ./build/bytetaper-extproc
        ctest --test-dir build -R extproc_server_smoke_test --output-on-failure
  bytetaper-integration-test:
    image: bytetaper-dev:latest
    working_dir: /workspace
    volumes:
      - ./:/workspace
    depends_on:
      mock-api:
        condition: service_healthy
      bytetaper-extproc:
        condition: service_healthy
      envoy:
        condition: service_healthy
    command:
      - /bin/bash
      - -lc
      - |
        set -eu
        python3 tests/integration/e2e/oversized_envoy_assert.py

  bytetaper-cache-hit-test:
    image: bytetaper-dev:latest
    working_dir: /workspace
    volumes:
      - ./:/workspace
    environment:
      - BYTETAPER_TEST_BASE_URL=http://envoy:10000
      - BYTETAPER_MOCK_COUNTER_URL=http://mock-api:8080/call-count
    depends_on:
      mock-api:
        condition: service_healthy
      bytetaper-extproc:
        condition: service_healthy
      envoy:
        condition: service_healthy
    command:
      - /bin/bash
      - -lc
      - |
        set -eu
        python3 ./tests/integration/e2e/cache_hit_immediate_response_test.py

  bytetaper-pagination-test:
    image: bytetaper-dev:latest
    working_dir: /workspace
    volumes:
      - ./:/workspace
    depends_on:
