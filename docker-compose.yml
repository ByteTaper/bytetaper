      - BYTETAPER_TRACE_PHASE_SLOW_MS
      - BYTETAPER_L2_BLOCK_CACHE_MB
      - BYTETAPER_L2_WRITE_BUFFER_MB
      - BYTETAPER_L2_MAX_BACKGROUND_JOBS
      - BYTETAPER_HASH_SEED_HEX
    command:
      - /bin/bash
      - -lc
      - |
        set -eu
        mkdir -p /tmp/bytetaper-cache-pagination
        exec ./build/bytetaper-extproc-server --listen-address 0.0.0.0:18080 --policy-file examples/policy/pagination-benchmark-policy.yaml --l2-cache-path /tmp/bytetaper-cache-pagination --metrics-address 0.0.0.0 --metrics-port 18081
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/18081 && printf \"GET /readyz HTTP/1.0\\r\\nHost: 127.0.0.1\\r\\n\\r\\n\" >&3 && read -r line <&3 && [[ \"$$line\" == *\"200\"* ]]'"]
      interval: 2s
      timeout: 2s
      retries: 20
      start_period: 10s

  envoy-bytetaper-pagination:
    build:
      context: .
      dockerfile: docker/envoy.Dockerfile
    depends_on:
      mock-api:
        condition: service_healthy
