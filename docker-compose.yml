  bytetaper-coalescing-burst-test:
    image: bytetaper-dev:latest
    working_dir: /workspace
    volumes:
      - ./:/workspace
    environment:
      - BYTETAPER_TEST_BASE_URL=http://envoy:10000
      - BYTETAPER_MOCK_COUNTER_URL=http://mock-api:8080/call-count
      - BYTETAPER_MOCK_RESET_URL=http://mock-api:8080/reset-count
    depends_on:
