    healthcheck:
      test:
        - CMD
        - /usr/local/bin/envoy
        - --mode
        - validate
        - -c
        - /etc/envoy/envoy-bytetaper-pagination.yaml
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 2s

  bytetaper-extproc-coalescing:
    image: bytetaper-dev:latest
    depends_on:
      bytetaper-build-server:
        condition: service_completed_successfully
      mock-api:
        condition: service_healthy
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - bt-build:/workspace/build
    environment:
