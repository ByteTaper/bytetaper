    command:
      - /bin/bash
      - -lc
      - |
        set -eu
        cmake -S . -B /tmp/build -G Ninja -DBYTETAPER_ENABLE_INTEGRATION_TESTS=ON -DBYTETAPER_ENABLE_GTEST_TESTS=OFF
        cmake --build /tmp/build --target json_filter_benchmark
        /tmp/build/json_filter_benchmark

