        set -eu
        sh ./tests/integration/pagination_max_limit_test.sh

  bytetaper-extproc:
    image: bytetaper-dev:latest
    depends_on:
      bytetaper-build-server:
        condition: service_completed_successfully
      mock-api:
        condition: service_healthy
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - bt-build:/workspace/build
      - bt-policy-state:/var/lib/bytetaper/policy
    environment:
      - BYTETAPER_TRACE_ENABLED
      - BYTETAPER_TRACE_SCENARIO
      - BYTETAPER_TRACE_SLOW_MS
      - BYTETAPER_TRACE_OUTPUT_DIR
      - BYTETAPER_TRACE_SLOW_TOTAL_MS
      - BYTETAPER_TRACE_SLOW_GRPC_WRITE_MS
      - BYTETAPER_TRACE_SLOW_PHASE_MS
      - BYTETAPER_TRACE_GRPC_WRITE_SLOW_MS
      - BYTETAPER_TRACE_PHASE_SLOW_MS
      - BYTETAPER_L2_BLOCK_CACHE_MB
      - BYTETAPER_L2_WRITE_BUFFER_MB
      - BYTETAPER_L2_MAX_BACKGROUND_JOBS
      - BYTETAPER_HASH_SEED_HEX
      - BYTETAPER_WORKER_COUNT
      - BYTETAPER_LOOKUP_LANE_QUOTA
      - BYTETAPER_STORE_LANE_QUOTA
      - BYTETAPER_ASYNC_STORE_MAX_BODY_SIZE
      - BYTETAPER_ADMIN_ENABLED
      - BYTETAPER_ADMIN_ADDRESS
      - BYTETAPER_ADMIN_PORT
      - BYTETAPER_POLICY_PERSISTENCE_ENABLED=${BYTETAPER_POLICY_PERSISTENCE_ENABLED:-1}
      - BYTETAPER_POLICY_STATE_DIR=${BYTETAPER_POLICY_STATE_DIR:-/var/lib/bytetaper/policy}
    command:
      - /bin/bash
      - -lc
      - |
        set -eu
        mkdir -p /tmp/bytetaper-cache
        if [ -n "$${BYTETAPER_POLICY_STATE_DIR:-}" ]; then
          mkdir -p "$${BYTETAPER_POLICY_STATE_DIR}"
        fi

        ADMIN_ARGS=""
        if [ "$${BYTETAPER_ADMIN_ENABLED:-1}" = "1" ]; then
          ADMIN_ARGS="--admin-enable-taperquery \
            --admin-address $${BYTETAPER_ADMIN_ADDRESS:-0.0.0.0} \
            --admin-port $${BYTETAPER_ADMIN_PORT:-18082}"
        fi

        exec ./build/bytetaper-extproc-server \
          --listen-address 0.0.0.0:18080 \
          --policy-file examples/policy/bytetaper-policy.yaml \
          --l2-cache-path /tmp/bytetaper-cache \
          --metrics-address 0.0.0.0 \
          --metrics-port 18081 \
          $${ADMIN_ARGS}
    ports:
      - "18080:18080"
      - "18081:18081"
      - "18082:18082"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/18081 && printf \"GET /readyz HTTP/1.0\\r\\nHost: 127.0.0.1\\r\\n\\r\\n\" >&3 && read -r line <&3 && [[ \"$$line\" == *\"200\"* ]]'"]
      interval: 2s
      timeout: 2s
      retries: 20
      start_period: 10s

  mock-api:
    image: python:3.12-alpine
    working_dir: /workspace
    volumes:
      - ./:/workspace:ro
    command: ["python3", "/workspace/examples/mock-api/server.py"]
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "8080"]
      interval: 2s
      timeout: 2s
      retries: 20
      start_period: 3s

  envoy:
    build:
      context: .
      dockerfile: docker/envoy.Dockerfile
    depends_on:
      mock-api:
        condition: service_healthy
      bytetaper-extproc:
        condition: service_healthy
    volumes:
      - ./examples/envoy:/etc/envoy:ro
    healthcheck:
      test:
        - CMD
        - /usr/local/bin/envoy
        - --mode
        - validate
        - -c
        - /etc/envoy/envoy.yaml
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 2s

  bytetaper-cache-e2e-test:
