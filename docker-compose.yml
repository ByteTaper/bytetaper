        condition: service_healthy
  bytetaper-dev-build:
    image: bytetaper-dev:latest
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - bt-build:/workspace/build
      - bt-ccache:/home/bytetaper/.cache/ccache
    command:
      - /bin/bash
      - -lc
      - |
        set -eu
        cmake -S . -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Debug \
          -DBYTETAPER_ENABLE_GTEST_TESTS=ON \
          -DBYTETAPER_ENABLE_INTEGRATION_TESTS=ON \
          -DCMAKE_C_COMPILER_LAUNCHER=ccache \
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
        cmake --build build

  bytetaper-dev-shell:
    image: bytetaper-dev:latest
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - bt-build:/workspace/build
      - bt-ccache:/home/bytetaper/.cache/ccache
    command: ["/bin/bash"]

  bytetaper-runtime-image-build:
    build:
      context: .
      dockerfile: docker/production.Dockerfile
    image: bytetaper-runtime:latest
    command: ["--help"]
    profiles: ["runtime-test"]

  bytetaper-runtime-smoke-test:
    image: bytetaper-runtime:latest
    depends_on:
      bytetaper-runtime-image-build:
        condition: service_completed_successfully
    volumes:
      - ./examples/policy/coalescing-benchmark-policy.yaml:/etc/bytetaper/policy.yaml:ro
      - bt-l2-cache:/var/lib/bytetaper/l2-cache
    command:
      - "--listen-address"
      - "0.0.0.0:18080"
      - "--policy-file"
      - "/etc/bytetaper/policy.yaml"
      - "--l2-cache-path"
      - "/var/lib/bytetaper/l2-cache"
      - "--metrics-address"
      - "0.0.0.0"
      - "--metrics-port"
      - "18081"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/18081 && printf \"GET /readyz HTTP/1.0\\r\\nHost: 127.0.0.1\\r\\n\\r\\n\" >&3 && read -r line <&3 && [[ \"$$line\" == *\"200\"* ]]'"]
      interval: 2s
      timeout: 2s
      retries: 10
      start_period: 5s
    profiles: ["runtime-test"]

  bytetaper-runtime-contract-check:
    image: bytetaper-runtime:latest
    depends_on:
      bytetaper-runtime-image-build:
        condition: service_completed_successfully
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        echo "Verifying binary version..."
        bytetaper-extproc-server --version | grep -q "version:"
        bytetaper-extproc-server --version | grep -q "build_type: Release"
        echo "Verifying build-info.json..."
        grep -q "version" /opt/bytetaper/build-info.json
        grep -q "git_sha" /opt/bytetaper/build-info.json
        echo "Verifying writable runtime directories..."
        test -w /var/lib/bytetaper/l2-cache
        test -w /var/run/bytetaper
        echo "Verifying non-writable protected directories..."
        ! test -w /usr/local/bin
        ! test -w /opt/bytetaper
        echo "SUCCESS: Runtime contract check passed!"
    profiles: ["runtime-test"]

  bytetaper-runtime-smoke-validator:
    image: bytetaper-dev:latest
    depends_on:
      bytetaper-runtime-smoke-test:
        condition: service_healthy
    volumes:
      - ./:/workspace
    working_dir: /workspace
    command:
      - /bin/bash
      - -lc
      - |
        set -eu
        echo "Querying metrics from bytetaper-runtime-smoke-test..."
        response=$$(curl -f -s http://bytetaper-runtime-smoke-test:18081/metrics)
        echo "Metrics fetched successfully!"
        echo "$$response" | grep -q "bytetaper_cache_l1_hit_total" || {
          echo "ERROR: Metrics response missing expected 'bytetaper_cache_l1_hit_total'!"
          exit 1;
        }
        echo "SUCCESS: Production runtime smoke test validator passed!"
    profiles: ["runtime-test"]

  bytetaper-tsan-test:
    image: bytetaper-dev:latest
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - bt-build-tsan:/workspace/build-tsan
      - bt-ccache:/home/bytetaper/.cache/ccache
    environment:
      - TSAN_OPTIONS=second_deadlock_stack=1:halt_on_error=1:history_size=7
    command:
      - /bin/bash
      - -lc
      - |
        set -eu
        cmake -S . -B build-tsan -G Ninja \
          -DBYTETAPER_ENABLE_GTEST_TESTS=ON \
          -DBYTETAPER_ENABLE_INTEGRATION_TESTS=ON \
          -DBYTETAPER_ENABLE_TSAN=ON \
          -DCMAKE_C_COMPILER_LAUNCHER=ccache \
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
        cmake --build build-tsan
        ctest --test-dir build-tsan -R "concurrency" --output-on-failure

  bytetaper-asan-test:
