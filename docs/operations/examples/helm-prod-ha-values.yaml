# ByteTaper Multi-Replica HA Production Values Reference
# ====================================================

image:
  repository: ghcr.io/ByteTaper/bytetaper-runtime
  digest: "sha256:REPLACE_WITH_RELEASE_DIGEST"
  pullPolicy: IfNotPresent

replicaCount: 3

# IMPORTANT: In Deployment mode, multiple replicas must use emptyDir
# to avoid concurrent RocksDB access to the same PVC.
l2Cache:
  enabled: true
  persistence:
    enabled: false
  emptyDir:
    enabled: true

# Guard against node failure
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: bytetaper

# Ensure at least 2 replicas are always available during maintenance
podDisruptionBudget:
  enabled: true
  minAvailable: 2

# Monitoring enabled
metrics:
  enabled: true

# Admin endpoint disabled
admin:
  enabled: false

# Resource requests and limits
resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 2Gi
