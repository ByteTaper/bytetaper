routes:
  # Leg L1-Inline: Small body-size tier with immediate inline cache delivery on wakeup
  - id: "products-coalescing-tier-l1"
    match:
      kind: prefix
      prefix: /products/tier-l1/
    method: get
    mutation: full
    max_response_bytes: 2097152
    coalescing:
      enabled: true
      max_waiters_per_key: 128
      require_cache_enabled: true
      allow_authenticated: false
      backend_timeout_ms: 50
      handoff_buffer_ms: 25
      result_ready_retention_ms: 12
      max_follower_wait_budget_ms: 0
      max_active_follower_waiters: 0
      max_active_follower_waiters_per_shard: 0
    cache:
      enabled: true
      behavior: store
      ttl_seconds: 300

  # Leg L2-Completion: Medium body-size tier using synchronous L2 probe check on wakeup
  - id: "products-coalescing-tier-l2complete"
    match:
      kind: prefix
      prefix: /products/tier-l2complete/
    method: get
    mutation: full
    max_response_bytes: 2097152
    coalescing:
      enabled: true
      max_waiters_per_key: 128
      require_cache_enabled: true
      allow_authenticated: false
      backend_timeout_ms: 50
      handoff_buffer_ms: 25
      result_ready_retention_ms: 12
      max_follower_wait_budget_ms: 0
      max_active_follower_waiters: 0
      max_active_follower_waiters_per_shard: 0
    cache:
      enabled: true
      behavior: store
      ttl_seconds: 300

  # Leg L2-Warm-Only: Large body-size tier where followers fallback as payload exceeds handoff buffer limit
  - id: "products-coalescing-tier-l2warmonly"
    match:
      kind: prefix
      prefix: /products/tier-l2warmonly/
    method: get
    mutation: full
    max_response_bytes: 2097152
    coalescing:
      enabled: true
      max_waiters_per_key: 128
      require_cache_enabled: true
      allow_authenticated: false
      backend_timeout_ms: 50
      handoff_buffer_ms: 25
      result_ready_retention_ms: 12
      max_follower_wait_budget_ms: 0
      max_active_follower_waiters: 0
      max_active_follower_waiters_per_shard: 0
    cache:
      enabled: true
      behavior: store
      ttl_seconds: 300

  # Catch-all default products route to ensure existing integration tests function unmodified
  - id: "products-coalescing-benchmark-default"
    match:
      kind: prefix
      prefix: /products/
    method: get
    mutation: full
    max_response_bytes: 2097152
    coalescing:
      enabled: true
      max_waiters_per_key: 128
      require_cache_enabled: true
      allow_authenticated: false
      backend_timeout_ms: 50
      handoff_buffer_ms: 25
      result_ready_retention_ms: 12
      max_follower_wait_budget_ms: 0
      max_active_follower_waiters: 0
      max_active_follower_waiters_per_shard: 0
    cache:
      enabled: true
      behavior: store
      ttl_seconds: 300
