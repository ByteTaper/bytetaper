replicaCount: 3

image:
  repository: ghcr.io/bytetaper/bytetaper-runtime
  digest: "sha256:REPLACE_WITH_RELEASE_DIGEST"
  pullPolicy: IfNotPresent

l2Cache:
  enabled: true
  persistence:
    enabled: false
  emptyDir:
    enabled: true

podDisruptionBudget:
  enabled: true
  minAvailable: 2

admin:
  enabled: false

metrics:
  enabled: true
