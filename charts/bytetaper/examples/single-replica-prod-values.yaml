replicaCount: 1

image:
  repository: ghcr.io/ByteTaper/bytetaper-runtime
  digest: "sha256:REPLACE_WITH_RELEASE_DIGEST"
  pullPolicy: IfNotPresent

l2Cache:
  enabled: true
  persistence:
    enabled: true
    size: 20Gi
  emptyDir:
    enabled: false

admin:
  enabled: false

metrics:
  enabled: true

podDisruptionBudget:
  enabled: true
  minAvailable: 1

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 2Gi
