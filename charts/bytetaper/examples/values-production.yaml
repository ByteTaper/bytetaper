replicaCount: 2

image:
  repository: ghcr.io/haluan/bytetaper-runtime
  digest: "sha256:4c2759d9762b10723f1d4642f5419d6642131990b72f8bf30e68"
  pullPolicy: IfNotPresent

policy:
  mode: existingConfigMap
  existingConfigMap:
    name: "bytetaper-production-policy"
    key: "policy.yaml"

l2Cache:
  persistence:
    enabled: true
    accessModes:
      - ReadWriteOnce
    size: 20Gi

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 512Mi

podDisruptionBudget:
  enabled: true
  minAvailable: 1

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 75

metrics:
  serviceMonitor:
    enabled: true
    interval: 10s
