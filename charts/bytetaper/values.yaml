# replicaCount > 1: each pod owns its own L1 memory cache and L2 RocksDB cache.
# The L2 cache is NOT shared across replicas. Do not mount the same RocksDB
# PVC path into multiple ByteTaper pods. See docs/deployment/helm-ha-production.md.
replicaCount: 1

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 25%
    maxUnavailable: 25%

image:
  repository: ghcr.io/bytetaper/bytetaper-runtime
  pullPolicy: IfNotPresent
  tag: ""
  digest: ""
  pullSecrets: []

nameOverride: ""
fullnameOverride: ""

deploymentAnnotations: {}

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

runtime:
  listenAddress: "0.0.0.0:18080"
  extProcPort: 18080
  policyPath: "/etc/bytetaper/policy.yaml"
  l2CachePath: "/var/lib/bytetaper/l2-cache"
  metricsAddress: "0.0.0.0"
  metricsPort: 18081

policy:
  mode: inline
  inline: |
    routes: []
  existingConfigMap:
    name: ""
    key: "policy.yaml"
  existingSecret:
    name: ""
    key: "policy.yaml"

l2Cache:
  enabled: true
  # persistence.enabled: recommended when cache warmness matters across pod restarts.
  # Each replica must have its own PVC (not a shared ReadWriteMany volume).
  persistence:
    enabled: true
    storageClassName: ""
    accessModes:
      - ReadWriteOnce
    size: 10Gi
    existingClaim: ""
  # emptyDir: cache is lost on pod restart or rescheduling. Acceptable for
  # cache-only workloads where cold-cache is tolerable.
  emptyDir:
    enabled: false
    sizeLimit: ""

admin:
  enabled: false
  listenAddress: "0.0.0.0:18082"
  service:
    enabled: false
    type: ClusterIP
    port: 18082

metrics:
  enabled: true
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}
    annotations: {}

probes:
  liveness:
    enabled: true
    path: /healthz
    initialDelaySeconds: 15
    periodSeconds: 20
    timeoutSeconds: 3
    failureThreshold: 3
  readiness:
    enabled: true
    path: /readyz
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: false
  minAvailable: 1

networkPolicy:
  enabled: false
  ingress:
    namespaceSelector: {}
    podSelector: {}
