name: ByteTaper CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check runtime boundary violations
        run: python3 tools/check_runtime_boundaries.py

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build dev image
        run: |
          LOCAL_UID=$(id -u) LOCAL_GID=$(id -g) docker compose build bytetaper-dev

      - name: Build and Run Unit Tests
        run: |
          LOCAL_UID=$(id -u) LOCAL_GID=$(id -g) docker compose run --rm bytetaper-unit-test

      - name: Build and Run Smoke Tests
        run: |
          LOCAL_UID=$(id -u) LOCAL_GID=$(id -g) docker compose run --rm bytetaper-smoke-test

      - name: Build and Run Integration Tests
        run: |
          LOCAL_UID=$(id -u) LOCAL_GID=$(id -g) docker compose run --rm bytetaper-integration-test

      - name: Build and Run Healthz/Readyz Tests
        run: |
          LOCAL_UID=$(id -u) LOCAL_GID=$(id -g) docker compose run --rm bytetaper-healthz-readyz-test

  sanitizer-fast:
    runs-on: ubuntu-24.04
    needs: test
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [asan, ubsan]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build dev image
        run: |
          LOCAL_UID=$(id -u) LOCAL_GID=$(id -g) docker compose build bytetaper-dev

      - name: Run ${{ matrix.sanitizer }} tests
        run: |
          LOCAL_UID=$(id -u) LOCAL_GID=$(id -g) \
            docker compose run --rm bytetaper-${{ matrix.sanitizer }}-test

  sanitizer-tsan:
    runs-on: ubuntu-24.04
    needs: test
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build dev image
        run: |
          LOCAL_UID=$(id -u) LOCAL_GID=$(id -g) docker compose build bytetaper-dev

      - name: Run TSAN concurrency tests
        run: |
          LOCAL_UID=$(id -u) LOCAL_GID=$(id -g) \
            docker compose run --rm bytetaper-tsan-test

  benchmark:
    runs-on: ubuntu-24.04
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build dev image
        run: |
          LOCAL_UID=$(id -u) LOCAL_GID=$(id -g) docker compose build bytetaper-dev

      - name: Run coalescing burst benchmark
        run: |
          LOCAL_UID=$(id -u) LOCAL_GID=$(id -g) docker compose run --rm bytetaper-benchmark ./benchmarks/scenarios/coalescing_burst.sh

      - name: Run coalescing body-size tier benchmark
        run: |
          LOCAL_UID=$(id -u) LOCAL_GID=$(id -g) \
            docker compose run --rm bytetaper-coalescing-body-size-tiers-test

      - name: Collect benchmark artifacts
        run: benchmarks/collect_artifacts.sh

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ github.sha }}
          path: |
            benchmark-summary.json
            benchmark-summary.md
            mock-api-metrics.json
            coalescing-summary.json
          if-no-files-found: error
          retention-days: 30

  runtime-image:
    runs-on: ubuntu-24.04
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build dev image
        run: |
          LOCAL_UID=$(id -u) LOCAL_GID=$(id -g) \
            docker compose build bytetaper-dev

      - name: Compile release binary
        run: |
          LOCAL_UID=$(id -u) LOCAL_GID=$(id -g) \
            docker compose run --rm bytetaper-build-server

      - name: Export CI build metadata
        run: |
          echo "BYTETAPER_VERSION=${GITHUB_REF_NAME:-dev}" >> "$GITHUB_ENV"
          echo "BYTETAPER_GIT_SHA=${GITHUB_SHA:-unknown}" >> "$GITHUB_ENV"
          echo "BYTETAPER_BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Build production image with metadata
        run: |
          docker build \
            -f docker/production.Dockerfile \
            --build-arg BYTETAPER_VERSION="${BYTETAPER_VERSION}" \
            --build-arg BYTETAPER_GIT_SHA="${BYTETAPER_GIT_SHA}" \
            --build-arg BYTETAPER_BUILD_DATE="${BYTETAPER_BUILD_DATE}" \
            -t bytetaper-runtime:ci \
            .

      - name: Verify binary version
        run: |
          VERSION_OUT=$(docker run --rm bytetaper-runtime:ci --version)
          echo "$VERSION_OUT"
          echo "$VERSION_OUT" | grep -q "version:    ${BYTETAPER_VERSION}"
          echo "$VERSION_OUT" | grep -q "git_sha:    ${BYTETAPER_GIT_SHA}"
          echo "$VERSION_OUT" | grep -q "build_date: ${BYTETAPER_BUILD_DATE}"
          echo "$VERSION_OUT" | grep -q "build_type: Release"

      - name: Verify OCI labels
        run: |
          LABELS=$(docker image inspect bytetaper-runtime:ci --format '{{json .Config.Labels}}')
          echo "$LABELS" | jq .
          echo "$LABELS" | jq -e '.["org.opencontainers.image.title"] == "ByteTaper Runtime"' > /dev/null
          echo "$LABELS" | jq -e '.["org.opencontainers.image.description"] == "ByteTaper API Performance Gateway runtime image"' > /dev/null
          echo "$LABELS" | jq -e '.["org.opencontainers.image.source"] == "https://github.com/ByteTaper/bytetaper"' > /dev/null
          echo "$LABELS" | jq -e '.["org.opencontainers.image.revision"] == "'"${BYTETAPER_GIT_SHA}"'"' > /dev/null
          echo "$LABELS" | jq -e '.["org.opencontainers.image.version"] == "'"${BYTETAPER_VERSION}"'"' > /dev/null
          echo "$LABELS" | jq -e '.["org.opencontainers.image.created"] == "'"${BYTETAPER_BUILD_DATE}"'"' > /dev/null
          echo "$LABELS" | jq -e '.["org.opencontainers.image.licenses"] == "AGPL-3.0-only OR LicenseRef-Commercial"' > /dev/null

      - name: Verify non-root user
        run: |
          USER=$(docker image inspect bytetaper-runtime:ci --format '{{.Config.User}}')
          echo "User: $USER"
          [ "$USER" = "bytetaper" ] || [ "$USER" = "1001" ]

      - name: Verify runtime permission contract
        run: |
          docker run --rm --entrypoint /bin/sh bytetaper-runtime:ci -c '
            set -eu
            test -w /var/lib/bytetaper/l2-cache
            test -w /var/run/bytetaper
            ! test -w /usr/local/bin
            ! test -w /opt/bytetaper
            ! test -w /etc/bytetaper
          '

      - name: Run production runtime contract check
        run: |
          LOCAL_UID=$(id -u) LOCAL_GID=$(id -g) \
            docker compose --profile runtime-test run --rm bytetaper-runtime-contract-check

      - name: Run production smoke validation suite
        run: |
          LOCAL_UID=$(id -u) LOCAL_GID=$(id -g) \
            docker compose --profile runtime-test run --rm bytetaper-runtime-smoke-validator

      - name: Setup Syft and Grype
        run: |
          curl -sSfL https://get.anchore.io/syft | sudo sh -s -- -b /usr/local/bin
          curl -sSfL https://get.anchore.io/grype | sudo sh -s -- -b /usr/local/bin
          syft version
          grype version

      - name: Check legal notice freshness
        run: |
          tools/supply_chain/check_notice_freshness.sh "${{ github.event.pull_request.base.sha || 'HEAD~1' }}" "${{ github.sha || 'HEAD' }}"

      - name: Run supply-chain readiness check
        run: |
          mkdir -p dist/supply-chain
          tools/supply_chain/check_runtime_image.sh bytetaper-runtime:ci

      - name: Upload supply-chain artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: supply-chain-${{ github.sha }}
          path: |
            dist/supply-chain/
            THIRD_PARTY_NOTICES.md
            LICENSES/
          retention-days: 30

      - name: Run production compose smoke matrix
        run: |
          mkdir -p dist/runtime-smoke
          tests/runtime/smoke_runtime_matrix.sh bytetaper-runtime:ci

      - name: Upload runtime smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-smoke-${{ github.sha }}
          path: dist/runtime-smoke/
          retention-days: 30

  helm-chart:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v4
        with:
          version: v3.17.0
      - name: Lint chart
        run: helm lint charts/bytetaper
      - name: Template — default chart values
        run: helm template bytetaper charts/bytetaper
      - name: Template — ci defaults
        run: helm template bytetaper charts/bytetaper --values charts/bytetaper/ci/default-values.yaml
      - name: Template — image digest
        run: helm template bytetaper charts/bytetaper --set image.digest=sha256:example
      - name: Template — existingConfigMap policy
        run: helm template bytetaper charts/bytetaper --set policy.mode=existingConfigMap --set policy.existingConfigMap.name=bytetaper-policy --set policy.existingConfigMap.key=custom-policy.yaml
      - name: Template — existingSecret policy
        run: helm template bytetaper charts/bytetaper --set policy.mode=existingSecret --set policy.existingSecret.name=bytetaper-policy --set policy.existingSecret.key=custom-policy.yaml
      - name: Template — admin enabled
        run: helm template bytetaper charts/bytetaper --set admin.enabled=true --set admin.service.enabled=true
      - name: Template — full optional features
        run: helm template bytetaper charts/bytetaper --set autoscaling.enabled=true --set podDisruptionBudget.enabled=true --set metrics.serviceMonitor.enabled=true
      - name: Template — metrics disabled
        run: helm template bytetaper charts/bytetaper --set metrics.enabled=false
      - name: Template — emptyDir cache
        run: helm template bytetaper charts/bytetaper --set l2Cache.persistence.enabled=false --set l2Cache.emptyDir.enabled=true
      - name: Template — emptyDir cache with sizeLimit
        run: helm template bytetaper charts/bytetaper --set l2Cache.persistence.enabled=false --set l2Cache.emptyDir.enabled=true --set l2Cache.emptyDir.sizeLimit=1Gi
      - name: Template — probes disabled
        run: helm template bytetaper charts/bytetaper --set probes.liveness.enabled=false --set probes.readiness.enabled=false
      - name: Template — networkPolicy enabled with custom ports
        run: helm template bytetaper charts/bytetaper --set networkPolicy.enabled=true --set runtime.extProcPort=19080 --set runtime.metricsPort=19081 --set service.extProcPort=19080 --set service.metricsPort=19081
      - name: Template — invalid policy mode should fail
        run: helm template bytetaper charts/bytetaper --set policy.mode=invalid && exit 1 || exit 0
      - name: Template Example — single-replica-prod
        run: helm template bytetaper charts/bytetaper --values charts/bytetaper/examples/single-replica-prod-values.yaml
      - name: Template Example — multi-replica-ha
        run: helm template bytetaper charts/bytetaper --values charts/bytetaper/examples/multi-replica-ha-values.yaml
      - name: Template Example — multi-replica-emptydir
        run: helm template bytetaper charts/bytetaper --values charts/bytetaper/examples/multi-replica-emptydir-values.yaml
      - name: Template Example — values-production
        run: helm template bytetaper charts/bytetaper --values charts/bytetaper/examples/values-production.yaml
      - name: Template Example — network-policy
        run: helm template bytetaper charts/bytetaper --values charts/bytetaper/examples/network-policy-values.yaml

  infra-templates:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.0"

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive terraform/

      - name: Validate module
        run: |
          terraform -chdir=terraform/modules/bytetaper-helm init -backend=false
          terraform -chdir=terraform/modules/bytetaper-helm validate

      - name: Validate kind example
        run: |
          terraform -chdir=terraform/examples/kind init -backend=false
          terraform -chdir=terraform/examples/kind validate

      - name: Validate eks example
        run: |
          terraform -chdir=terraform/examples/eks init -backend=false
          terraform -chdir=terraform/examples/eks validate

      - name: Validate gke example
        run: |
          terraform -chdir=terraform/examples/gke init -backend=false
          terraform -chdir=terraform/examples/gke validate

      - name: Validate aks example
        run: |
          terraform -chdir=terraform/examples/aks init -backend=false
          terraform -chdir=terraform/examples/aks validate

  operator:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.0"

      - name: Verify operator manifests
        run: make -C operator manifests

      - name: Verify generated code
        run: make -C operator generate

      - name: Run operator tests
        run: make -C operator test

      - name: Build operator image
        run: make -C operator docker-build IMG=bytetaper-operator:ci
