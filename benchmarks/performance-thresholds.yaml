# ByteTaper Performance Regression Guardrails Configuration
# Thresholds are baseline-focused safety limits, not marketing claims.

bytetaper_observe:
  max_p95_ms: 160.0
  max_error_rate: 0.0
  min_payload_reduction_ratio: 0.00

bytetaper_field_filtering:
  max_p95_ms: 180.0
  max_error_rate: 0.0
  min_payload_reduction_ratio: 0.00

cache_hit:
  max_p95_ms: 120.0
  max_error_rate: 0.0
  min_payload_reduction_ratio: 0.00

pagination_guardrail:
  max_p95_ms: 160.0
  max_error_rate: 0.0
  min_payload_reduction_ratio: 0.00

compression_coordination:
  max_p95_ms: 220.0
  max_error_rate: 0.0
  min_payload_reduction_ratio: 0.00

coalescing_burst:
  # Latency: overhead-relative
  baseline_leg: "Leg Baseline"
  target_leg: "Leg A"
  max_p95_overhead_ms: 300.0      # Leg A may be at most 300ms slower than baseline
  max_p95_overhead_ratio: 4.0     # or at most 4× baseline p95
  max_error_rate: 0.0    # was 0.05 — correctness threshold: zero non-2xx
  min_payload_reduction_ratio: 0.00
  # Coalescing correctness thresholds (Leg A fast path)
  min_coalescing_ratio_leg_a: 0.80       # >= 80% coalescing on fast path
  max_follower_unaccounted_leg_a: 0      # zero unaccounted followers required
  max_follower_missing_leg_a: 0          # zero missing followers on fast path
  # Leg B slow path
  min_fallbacks_leg_b: 1                 # at least some fallbacks expected on slow path
  max_upstream_amplification_ratio_leg_a: 0.20 # Max 20% upstream calls on fast path
  warn_p99_ms: 300.0                     # Warning-only limit for tail p99 latency

field_variant_cache:
  max_p95_ms: 250.0
  max_error_rate: 0.0
  min_payload_reduction_ratio: 0.00

header_variance_cache:
  max_p95_ms: 250.0
  max_error_rate: 0.0
  min_payload_reduction_ratio: 0.00

envoy_only:
  max_p95_ms: 100.0
  max_error_rate: 0.0
  min_payload_reduction_ratio: 0.00

performance_smoke:
  max_p95_overhead_ms: 350.0
  max_p95_overhead_ratio: 10.0
  max_error_rate: 0.0
  min_payload_reduction_ratio: 0.00
  baseline_leg: Baseline
  target_leg: Observe

coalescing_body_size_tiers:
  max_error_rate: 0.0
  max_upstream_calls_per_leg: 1
  max_follower_unaccounted: 0
  max_follower_missing: 0

  l1_inline_min_follower_l1_hit_ratio: 0.60
  l1_inline_max_p95_ms: 200.0

  l2_completion_min_probe_hit_total: 1
  l2_completion_max_p95_ms: 400.0

  l2_warmonly_min_fallbacks: 1
  l2_warmonly_max_p95_ms: 800.0
  l2_warmonly_warn_upstream_calls: 1

